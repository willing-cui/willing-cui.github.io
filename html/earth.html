<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Willing's Gallery</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            overflow-y: hidden;
        }
    </style>
    <script type="importmap">
      {
          "imports": {
              "three": "../assets/js/three/three.webgpu.js",
              "three/addons/": "../assets/js/three/jsm/",
              "three/webgpu": "../assets/js/three/three.webgpu.js",
              "three/tsl": "../assets/js/three/three.tsl.js"
          }
      }
    </script>
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/earth.css" />
    <style>
        /* Existing Body Styles */
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            overflow-y: hidden;
            -webkit-user-select: none;
            /* Safari */
            -ms-user-select: none;
            /* IE 10+ and Edge */
            user-select: none;
            /* 标准语法 */
        }
    </style>
</head>

<body id="gallery_container">
    <!-- 改进的旋转地球进度条 -->
    <div id="earth-progress">
        <!-- 背景星星 -->
        <div class="stars" id="stars"></div>

        <!-- 地球容器 -->
        <div class="earth-container">
            <div class="earth-orbit"></div>
            <div class="earth-atmosphere"></div>
            <div class="earth-base"></div>
            <div class="earth-landmask"></div>
            <div class="earth-clouds"></div>
            <div class="earth-highlight"></div>
        </div>

        <!-- 进度信息 -->
        <div class="progress-info">
            <div class="progress-text" id="progress-text">
                Initializing
                <span class="loading-dots">
                    <span>.</span>
                    <span>.</span>
                    <span>.</span>
                </span>
            </div>
            <div class="progress-percentage" id="progress-percentage">0%</div>
        </div>

        <!-- 进度条 -->
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <!-- 主体内容 -->
    <a href="../index.html">
        <div class="gallery_icon" style="background-image: url('../images/close-w.png');"></div>
    </a>

    <div id="mapMarkerButton" class="gallery_icon"
        style="right: 3rem; background-image: url('../images/map-marker-w.png');"></div>

    <div id="photo-list">
        <div class="photo-list-title">
            <h1 data-i18n="photo-list-title">Gallery</h1>
            <div href="#" style="cursor: pointer;" class="icon solid fa-circle-xmark"
                onclick="resetCurrentSelectedLandmark()"></div>
        </div>
        <div class="indicator-bar">
            <h3 id="landmarkName"></h3>
            <div id="state-indicator"></div>
        </div>

        <div id="waterfall-grid" class="waterfall-grid-container">
            <!-- Image cards will be dynamically injected here by JavaScript -->
        </div>
    </div>

    <!-- 放大图片展示 (模态框) -->
    <div id="image-modal" class="image-modal-lightbox" onclick="hideModal(event)">
        <div class="modal-content-wrapper" onclick="event.stopPropagation()">
            <div class="gallery_icon"
                style="background-image: url('../images/close-w.png'); margin-top: 0.5rem; margin-right: 0.5rem;"
                onclick="hideModal()"></div>
            <div class="image-container" id="image-container">
                <!-- 图片占位符 -->
                <div id="image-placeholder" class="image-placeholder">
                    <div class="placeholder-icon">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" />
                        </svg>
                    </div>
                    <div class="placeholder-text">图片加载中...</div>
                </div>

                <!-- 加载进度条 -->
                <div id="modal-loading-progress" class="modal-loading-progress-container">
                    <div class="modal-progress-background">
                        <div id="modal-progress-bar" class="modal-progress-bar"></div>
                    </div>
                    <div id="modal-progress-text" class="modal-progress-text">0%</div>
                </div>

                <!-- 图片容器 -->
                <img id="modal-image" src="" alt="Enlarged Image" class="modal-image-display" ondblclick="resetImage()"
                    onmousedown="startDrag(event)">
            </div>
        </div>
    </div>

    <script type="module" rel="preload" src="../assets/js/earth/earth_progress_bar.js"></script>
    <script type="module" rel="preload" src="../assets/js/earth/earth.js"></script>
    <script type="module" rel="preload" src="../assets/js/earth/earth_ui.js"></script>
    <script type="module" rel="preload" src="../assets/js/earth/landmark.js"></script>
    <script type="module" rel="preload" src="../assets/js/earth/load_gallery.js"></script>
    <script type="module" rel="preload" src="../assets/js/earth/modal_progress_bar.js"></script>

    <script src="../assets/js/jquery.min.js"></script>
    <!-- 语言切换功能脚本 -->
    <script>
        $(function () {
            // 根据当前语言加载内容
            const lang = getCurrentLanguage();

            // 设置初始语言
            setLanguage(lang);
        })

        // 语言资源文件
        const translations = {
            en: {
                "photo-list-title": "Gallery",
                "page_title": "Willing's Gallery"
            },
            zh: {
                "photo-list-title": "摄影画廊",
                "page_title": "Willing 的摄影画廊"
            }
        };

        // 获取当前语言
        function getCurrentLanguage() {
            const savedLang = localStorage.getItem('preferred-language');
            const browserLang = navigator.language.startsWith('zh') ? 'zh' : 'en';
            return savedLang || browserLang || 'en';
        }

        // 设置语言
        function setLanguage(lang) {
            // 更新页面标题
            document.title = translations[lang].page_title;

            // 更新所有带 data-i18n 属性的元素
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    if (element.tagName === 'INPUT' || element.tagName === 'TEXTAREA') {
                        element.placeholder = translations[lang][key];
                    } else if (element.hasAttribute('title')) {
                        element.setAttribute('title', translations[lang][key]);
                    } else {
                        element.innerHTML = translations[lang][key];
                    }
                }
            });
        }
    </script>
</body>

</html>
